<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create seedAnalysis Node</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
            display: block !important;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
            display: block !important;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
            display: block !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 Fix seedAnalysis Node</h1>
        <p style="color: #666; margin-bottom: 30px;">
            This will create the missing seedAnalysis node in your Firebase database.
        </p>
        
        <button class="btn" onclick="createNode()" id="createBtn">
            ✅ Create seedAnalysis Node
        </button>
        
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, push, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAhIWGj1t9w9d00_Y1S7teWXoflWakzxTU",
            authDomain: "ai-integrated-rice-assistant.firebaseapp.com",
            databaseURL: "https://ai-integrated-rice-assistant-default-rtdb.firebaseio.com",
            projectId: "ai-integrated-rice-assistant",
            storageBucket: "ai-integrated-rice-assistant.firebasestorage.app",
            messagingSenderId: "1073641924738",
            appId: "1:1073641924738:web:137f753a2fc4fd5382ec9b"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Make function available globally
        window.createNode = async function() {
            const btn = document.getElementById('createBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '⏳ Creating...';
            
            try {
                const userId = "tXhliH8J9qPkgffgd95KMi9F9qj2";
                const dbRef = ref(db, `users/${userId}/seedAnalysis`);
                
                console.log('📍 Creating seedAnalysis node...');
                console.log('📍 Path:', `users/${userId}/seedAnalysis`);
                
                const result = await push(dbRef, {
                    result: {
                        seedName: "Test Entry - Please Delete Later",
                        qualityGrade: "Test",
                        status: "Completed",
                        confidence: 100
                    },
                    createdAt: Date.now(),
                    timestamp: serverTimestamp()
                });
                
                console.log('✅ SUCCESS! Node created:', result.key);
                
                status.innerHTML = `
                    <div style="font-size: 24px; margin-bottom: 10px;">✅ SUCCESS!</div>
                    <div>seedAnalysis node created successfully!</div>
                    <div style="margin-top: 10px; font-size: 14px;">
                        Node ID: <code style="background: #f0f0f0; padding: 3px 8px; border-radius: 5px;">${result.key}</code>
                    </div>
                    <div style="margin-top: 15px;">
                        Now go to your app and test! 🚀
                    </div>
                `;
                status.className = 'success';
                
            } catch (error) {
                console.error('❌ FAILED:', error);
                
                status.innerHTML = `
                    <div style="font-size: 24px; margin-bottom: 10px;">❌ FAILED</div>
                    <div>${error.message}</div>
                    <div style="margin-top: 15px; font-size: 14px; color: #856404;">
                        Please check Firebase Database rules or contact support.
                    </div>
                `;
                status.className = 'error';
                
                btn.disabled = false;
                btn.textContent = '🔄 Try Again';
            }
        };
        
        // Show info on load
        window.addEventListener('load', () => {
            const status = document.getElementById('status');
            status.innerHTML = 'Click the button above to create seedAnalysis node.';
            status.className = 'info';
        });
    </script>
</body>
</html>
